<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0b0c10;
      --bg-card: rgba(31, 40, 51, 0.45);
      --border-card: rgba(255, 255, 255, 0.08);
      --primary: #66fcf1;
      --primary-hover: #45f3e5;
      --text: #c5c6c7;
      --text-muted: #8892b0;
      --success: #2ecc71;
      --warning: #f1c40f;
      --danger: #e74c3c;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-card);
      padding-bottom: 12px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--primary), #1f2833);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
      font-size: 14px;
    }

    h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-top: 0;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .url-display {
      font-size: 12px;
      color: #fff;
      word-break: break-all;
      font-family: monospace;
      line-height: 1.4;
      background: rgba(0, 0, 0, 0.2);
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .safety-verdict {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .verdict-text {
      color: var(--success);
    }

    .verdict-text.warn {
      color: var(--warning);
    }

    .verdict-text.block {
      color: var(--danger);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      text-align: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .stat-lbl {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      text-transform: uppercase;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #45f3e5);
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover {
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.4);
      transform: translateY(-1px);
    }

    footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <div class="logo-icon">P</div>
      <h1>Phishing Shield</h1>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      <span>Active</span>
    </div>
  </header>

  <div class="card">
    <h3 class="card-title">Current Domain</h3>
    <div class="url-display" id="domain-text">Detecting...</div>
    <div class="safety-verdict" id="verdict-container">
      <span>Status:</span>
      <span class="verdict-text" id="verdict-text">Analyzing site...</span>
    </div>
  </div>

  <div class="card">
    <h3 class="card-title">Shield Session Stats</h3>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-val" id="stat-scanned">0</div>
        <div class="stat-lbl">Scanned</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" style="color: var(--success);" id="stat-safe">0</div>
        <div class="stat-lbl">Safe</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" style="color: var(--danger);" id="stat-blocked">0</div>
        <div class="stat-lbl">Blocked</div>
      </div>
    </div>
  </div>

  <button id="check-btn">
    🔄 Re-Scan Current Page
  </button>

  <footer>
    Phishing Shield Engine v2.0.0
  </footer>

  <script src="popup.js"></script>
</body>
</html>
