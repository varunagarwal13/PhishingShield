<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blocked — Phishing Shield</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0d0f;
    --bg2: #111318;
    --border: #1e2028;
    --border2: #2a2d38;
    --red: #e53e3e;
    --red-dim: rgba(229,62,62,0.12);
    --red-border: rgba(229,62,62,0.3);
    --amber: #d97706;
    --amber-dim: rgba(217,119,6,0.1);
    --text: #c8cad8;
    --text-dim: #5a5e72;
    --text-bright: #f0f1f5;
    --green: #2dd573;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(229,62,62,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(229,62,62,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: grid-drift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(229,62,62,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: glow-pulse 4s ease-in-out infinite;
  }

  @keyframes grid-drift {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  /* LAYOUT */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(12,13,15,0.8);
    backdrop-filter: blur(8px);
  }
  .topbar-brand {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .topbar-brand span { color: var(--red); }
  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 1px;
  }
  .status-dot::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .card {
    width: 100%;
    max-width: 580px;
    animation: card-enter 0.4s ease;
  }

  @keyframes card-enter {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SCORE DISPLAY */
  .score-ring-wrap {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
  }
  .score-ring {
    position: relative;
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }
  .score-ring svg {
    transform: rotate(-90deg);
  }
  .score-ring-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--red);
  }
  .score-ring-label { flex: 1; }
  .score-ring-label h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text-bright);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .score-ring-label p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* URL BOX */
  .url-box {
    background: var(--red-dim);
    border: 1px solid var(--red-border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .url-icon { color: var(--red); font-size: 14px; flex-shrink: 0; }
  .url-text {
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    color: var(--red);
    word-break: break-all;
    line-height: 1.5;
    opacity: 0.85;
  }

  /* SIGNALS */
  .signals-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .signals-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 28px;
  }
  .signal-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    animation: signal-in 0.3s ease both;
  }
  .signal-item:nth-child(1) { animation-delay: 0.1s; }
  .signal-item:nth-child(2) { animation-delay: 0.2s; }
  .signal-item:nth-child(3) { animation-delay: 0.3s; }
  @keyframes signal-in {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .signal-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 11px 20px;
    border-radius: 5px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-back {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    flex: 1;
  }
  .btn-back:hover { border-color: #444; color: var(--text-bright); }
  .btn-report {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-size: 12px;
    padding: 11px 16px;
  }
  .btn-report:hover { border-color: var(--amber); color: var(--amber); }

  /* PIN SECTION */
  .pin-section {
    border-top: 1px solid var(--border);
    padding-top: 18px;
  }
  .pin-toggle {
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    background: none;
    border: none;
    letter-spacing: 1px;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pin-toggle:hover { color: var(--text); }
  .pin-form {
    display: none;
    margin-top: 12px;
    flex-direction: column;
    gap: 8px;
  }
  .pin-form.visible { display: flex; }
  .pin-label {
    font-size: 11px;
    color: var(--text-dim);
  }
  .pin-row {
    display: flex;
    gap: 8px;
  }
  .pin-input {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 9px 14px;
    color: var(--text-bright);
    font-family: 'Syne Mono', monospace;
    font-size: 18px;
    letter-spacing: 8px;
    width: 120px;
    outline: none;
    transition: border-color 0.15s;
  }
  .pin-input:focus { border-color: var(--text-dim); }
  .pin-input.error { border-color: var(--red); animation: shake 0.3s ease; }
  .pin-input.success { border-color: var(--green); }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .btn-pin {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-pin:hover { border-color: var(--green); color: var(--green); }
  .pin-status {
    font-size: 11px;
    color: var(--text-dim);
    min-height: 16px;
  }
  .pin-status.err { color: var(--red); }
  .pin-status.ok { color: var(--green); }

  /* FOOTER */
  footer {
    padding: 14px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    flex-wrap: wrap;
    gap: 6px;
  }

  #report-toast {
    display: none;
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg2);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 5px;
    font-family: 'Syne Mono', monospace;
    z-index: 9999;
    animation: toast-in 0.2s ease;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="page">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">PHISHING <span>SHIELD</span></div>
    <div class="status-dot">THREAT BLOCKED</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="card">

      <!-- SCORE RING -->
      <div class="score-ring-wrap">
        <div class="score-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none"
              stroke="rgba(229,62,62,0.1)" stroke-width="6"/>
            <circle id="score-arc" cx="40" cy="40" r="34" fill="none"
              stroke="#e53e3e" stroke-width="6"
              stroke-linecap="round"
              stroke-dasharray="213.6"
              stroke-dashoffset="213.6"/>
          </svg>
          <div class="score-ring-num" id="score-display">—</div>
        </div>
        <div class="score-ring-label">
          <h1>Access Blocked</h1>
          <p id="score-desc">Our analysis flagged this page as a high-risk phishing threat.</p>
        </div>
      </div>

      <!-- URL -->
      <div class="url-box">
        <span class="url-icon">⛔</span>
        <span class="url-text" id="blocked-url">—</span>
      </div>

      <!-- SIGNALS -->
      <div class="signals-label">Why it was blocked</div>
      <ul class="signals-list" id="signals-list">
        <li class="signal-item"><span class="signal-dot"></span>Loading analysis…</li>
      </ul>

      <!-- ACTIONS -->
      <div class="actions">
        <button class="btn btn-back" onclick="goBack()">← Go back to safety</button>
        <button class="btn btn-report" onclick="reportFalsePositive()">Report false positive</button>
      </div>

      <!-- PIN OVERRIDE -->
      <div class="pin-section">
        <button class="pin-toggle" onclick="togglePin()">
          <span id="pin-arrow">▸</span> I know this site is safe — enter override PIN
        </button>
        <div class="pin-form" id="pin-form">
          <span class="pin-label">Enter your 4-digit admin PIN to proceed</span>
          <div class="pin-row">
            <input type="password" class="pin-input" id="pin-input"
              maxlength="4" inputmode="numeric" placeholder="••••"
              onkeydown="if(event.key==='Enter') submitPin()"/>
            <button class="btn-pin" onclick="submitPin()">Unlock</button>
          </div>
          <span class="pin-status" id="pin-status"></span>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <span>PHISHING SHIELD v1.0</span>
    <span id="footer-time">—</span>
    <span>Local analysis · No data sent to cloud</span>
  </footer>
</div>

<div id="report-toast">✓ Reported as false positive</div>

<script>
  // ── Read query params ──
  const params = new URLSearchParams(window.location.search);
  const blockedURL = decodeURIComponent(params.get('url') || '');
  const score = parseInt(params.get('score') || '0');
  let signals = [];
  try { signals = JSON.parse(decodeURIComponent(params.get('signals') || '[]')); } catch {}

  // ── Populate URL ──
  document.getElementById('blocked-url').textContent = blockedURL || 'Unknown URL';

  // ── Animate score ring ──
  const circumference = 213.6;
  const arc = document.getElementById('score-arc');
  const scoreDisplay = document.getElementById('score-display');
  const offset = circumference - (circumference * Math.min(score, 100)) / 100;

  setTimeout(() => {
    arc.style.transition = 'stroke-dashoffset 1s ease';
    arc.style.strokeDashoffset = offset;
  }, 200);

  // Count-up animation
  let current = 0;
  const target = score;
  const step = Math.ceil(target / 40);
  const counter = setInterval(() => {
    current = Math.min(current + step, target);
    scoreDisplay.textContent = current;
    if (current >= target) clearInterval(counter);
  }, 25);

  // ── Populate signals ──
  const list = document.getElementById('signals-list');
  if (signals.length === 0) signals = ['High-risk domain detected'];
  list.innerHTML = signals.map(s => `
    <li class="signal-item">
      <span class="signal-dot"></span>
      <span>${s}</span>
    </li>
  `).join('');

  // ── Footer time ──
  document.getElementById('footer-time').textContent =
    new Date().toLocaleTimeString('en-IN', { hour12: false });

  // ── Score description ──
  const desc = document.getElementById('score-desc');
  if (score >= 90) desc.textContent = 'This page has near-certain phishing characteristics. Do not proceed.';
  else if (score >= 75) desc.textContent = 'Strong phishing signals detected across multiple analysis modules.';
  else desc.textContent = 'Multiple risk factors detected. Proceeding is not recommended.';

  // ── Actions ──
  function goBack() { history.back(); }

  function reportFalsePositive() {
    chrome.runtime.sendMessage({ type: 'FALSE_POSITIVE', url: blockedURL, score });
    const toast = document.getElementById('report-toast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  function togglePin() {
    const form = document.getElementById('pin-form');
    const arrow = document.getElementById('pin-arrow');
    const visible = form.classList.toggle('visible');
    arrow.textContent = visible ? '▾' : '▸';
    if (visible) setTimeout(() => document.getElementById('pin-input').focus(), 50);
  }

  function submitPin() {
    const input = document.getElementById('pin-input');
    const status = document.getElementById('pin-status');
    const pin = input.value;

    chrome.storage.local.get('override_pin', (data) => {
      const savedPin = data.override_pin || '0000';
      if (pin === savedPin) {
        input.classList.add('success');
        status.className = 'pin-status ok';
        status.textContent = '✓ PIN accepted — proceeding…';
        // Notify background to clear cache
        chrome.runtime.sendMessage({ type: 'PIN_OVERRIDE', url: blockedURL });
        setTimeout(() => { window.location.href = blockedURL; }, 800);
      } else {
        input.classList.add('error');
        status.className = 'pin-status err';
        status.textContent = 'Incorrect PIN';
        setTimeout(() => {
          input.classList.remove('error');
          input.value = '';
          status.textContent = '';
        }, 1500);
      }
    });
  }
</script>
</body>
</html>
